# ════════════════════════════════════════════════════════════════
# Корневой compose: поднимает оба сервиса (analysis-api + pdf-analysis-service)
# плюс Postgres и pgAdmin. Запускается из /Users/user/Desktop/project/.
#
# Команды:
#   docker compose up --build         # старт
#   docker compose logs -f app        # логи NestJS
#   docker compose logs -f pdf-analysis
#   docker compose exec app npx prisma migrate deploy
#   docker compose down -v            # остановить и снести тома
# ════════════════════════════════════════════════════════════════
version: "3.8"

services:
  # ──────────────────────────────────────────
  # Frontend (Vite + React, прод-сборка под nginx)
  # ──────────────────────────────────────────
  frontend:
    build:
      context: ./analysis-frontend
      dockerfile: Dockerfile
    container_name: analysis-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      app:
        condition: service_started
    networks:
      - app-network

  # ──────────────────────────────────────────
  # NestJS API (analysis-api)
  # ──────────────────────────────────────────
  app:
    build:
      context: ./analysis-api
      dockerfile: Dockerfile
      target: production
    container_name: analysis-api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
      - "5555:5555" # prisma studio при необходимости
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-analysis_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-changeme}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-changeme_refresh}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PDF_ANALYSIS_URL: http://pdf-analysis:8000
      PDF_ANALYSIS_TIMEOUT_MS: ${PDF_ANALYSIS_TIMEOUT_MS:-60000}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      pdf-analysis:
        condition: service_healthy
    networks:
      - app-network

  # ──────────────────────────────────────────
  # PDF Analysis Service (FastAPI / GOST validators)
  # ──────────────────────────────────────────
  pdf-analysis:
    build:
      context: ./pdf-analysis-service
      dockerfile: Dockerfile
    container_name: pdf-analysis
    restart: unless-stopped
    ports:
      - "${PDF_ANALYSIS_PORT:-8000}:8000"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ──────────────────────────────────────────
  # PostgreSQL
  # ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: analysis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-analysis_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-analysis_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ──────────────────────────────────────────
  # pgAdmin (опционально, для удобной работы с БД)
  # ──────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: analysis-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./analysis-api/pgadmin/servers.json:/pgadmin4/servers.json:ro
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  uploads_data:
    driver: local
